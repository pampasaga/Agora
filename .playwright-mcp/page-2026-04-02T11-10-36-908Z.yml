                - code [ref=e258]: Alt + Left Click
              - listitem [ref=e259]: Setup global and profile based lists
              - listitem [ref=e260]: Show on item tooltip if the item is on any active list
              - listitem [ref=e261]: Import and export your lists
              - listitem [ref=e262]: A GUI that let you plan your gear and shows a indicator if you already own an item
