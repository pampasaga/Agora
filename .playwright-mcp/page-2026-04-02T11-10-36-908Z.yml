            - list [ref=e244]:
              - listitem [ref=e245]: Loottables for Dungeons and Raids
              - listitem [ref=e246]: Crafting with informations about materials, created items and skill ranks
              - listitem [ref=e247]: Factions
              - listitem [ref=e248]: Collections with item sets and world events
              - listitem [ref=e249]: Favourites are the new wishlist
