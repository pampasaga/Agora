            - list [ref=e254]:
              - listitem [ref=e255]:
                - text: Add items directly from AtlasLoot with
                - code [ref=e256]: Alt + Left Click
              - listitem [ref=e257]: Setup global and profile based lists
              - listitem [ref=e258]: Show on item tooltip if the item is on any active list
              - listitem [ref=e259]: Import and export your lists
              - listitem [ref=e260]: A GUI that let you plan your gear and shows a indicator if you already own an item
