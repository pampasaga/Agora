            - list [ref=e242]:
              - listitem [ref=e243]: Loottables for Dungeons and Raids
              - listitem [ref=e244]: Crafting with informations about materials, created items and skill ranks
              - listitem [ref=e245]: Factions
              - listitem [ref=e246]: Collections with item sets and world events
              - listitem [ref=e247]: Favourites are the new wishlist
