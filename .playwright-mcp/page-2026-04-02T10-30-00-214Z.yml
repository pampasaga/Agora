        - generic [ref=e168]:
          - generic [ref=e170]:
            - paragraph [ref=e171]:
              - text: Germany’s AllStar Guild Toolkit is an all-in-one addon built for
              - strong [ref=e172]: "WoW Classic: The Burning Crusade"
              - text: that helps your guild stay organized across
              - strong [ref=e173]: guild bank logistics, crafting material planning, recipe management, and raid scheduling
              - text: —all in one place.
            - paragraph [ref=e174]: "It’s designed for guilds that want a clean workflow: officers plan what should exist in the guild bank, the addon checks current stock, calculates missing materials, and supports coordination features like a raid calendar and roster planning."
            - heading "Key Features" [level=2] [ref=e175]
            - heading "1) Guild Bank Stock Tracking" [level=3] [ref=e176]
            - list [ref=e177]:
              - listitem [ref=e178]:
                - paragraph [ref=e179]:
                  - text: Scan the
                  - strong [ref=e180]: Guild Bank
                  - text: and record what items and how many are currently available.
              - listitem [ref=e181]:
                - paragraph [ref=e182]: Track stock levels over time so your guild knows what is running low.
              - listitem [ref=e183]:
                - paragraph [ref=e184]:
                  - text: "Supports officer workflows: the addon focuses on"
                  - emphasis [ref=e185]: what the guild needs next
                  - text: ", not just raw lists of items."
            - heading "2) Crafting & Material Planning" [level=3] [ref=e186]
            - list [ref=e187]:
              - listitem [ref=e188]:
                - paragraph [ref=e189]: "Create “target items” (e.g., flasks, potions, enchants, resistance gear) and define:"
                - list [ref=e190]:
                  - listitem [ref=e191]:
                    - paragraph [ref=e192]: desired quantity to keep in stock
                  - listitem [ref=e193]:
                    - paragraph [ref=e194]: required crafting materials (“mats”)
              - listitem [ref=e195]:
                - paragraph [ref=e196]: "Automatically calculate how many materials are needed based on:"
                - list [ref=e197]:
                  - listitem [ref=e198]:
                    - paragraph [ref=e199]: the target item quantity
                  - listitem [ref=e200]:
                    - paragraph [ref=e201]: your saved crafting requirements
                  - listitem [ref=e202]:
                    - paragraph [ref=e203]: the current guild bank inventory
              - listitem [ref=e204]:
                - paragraph [ref=e205]: The UI highlights missing materials in a clear “To Farm / To Buy” style list.
            - heading "3) Recipe / Requirement Sync (Guild-Wide)" [level=3] [ref=e206]
            - list [ref=e207]:
              - listitem [ref=e208]:
                - paragraph [ref=e209]: Officers can define and maintain shared crafting requirements (recipes / bill of materials).
              - listitem [ref=e210]:
                - paragraph [ref=e211]: Data can be synchronized across the guild so members see the same targets and priorities.
              - listitem [ref=e212]:
                - paragraph [ref=e213]: "Helps ensure consistency: everyone farms the same mats for the same goals."
            - heading "4) Raid Planner & Calendar" [level=3] [ref=e214]
            - list [ref=e215]:
              - listitem [ref=e216]:
                - paragraph [ref=e217]:
                  - text: In-addon
                  - strong [ref=e218]: calendar view
                  - text: for raid scheduling.
              - listitem [ref=e219]:
                - paragraph [ref=e220]:
                  - text: Only authorized guild ranks (e.g.,
                  - strong [ref=e221]: Guild Master / Raid Leader
                  - text: ) can create or edit raids.
              - listitem [ref=e222]:
                - paragraph [ref=e223]: "Raids show directly on the day tile with key info:"
                - list [ref=e224]:
                  - listitem [ref=e225]:
                    - paragraph [ref=e226]: raid type (dropdown of TBC raids)
                  - listitem [ref=e227]:
                    - paragraph [ref=e228]: raid size (10/25 where relevant)
                  - listitem [ref=e229]:
                    - paragraph [ref=e230]: time, notes, etc.
              - listitem [ref=e231]:
                - paragraph [ref=e232]: Members can click a raid entry and sign up.
              - listitem [ref=e233]:
                - paragraph [ref=e234]: Raid leads get a clear roster overview to confirm the lineup and plan roles.
            - heading "5) Roster Planning (Optional / Advanced)" [level=3] [ref=e235]
            - list [ref=e236]:
              - listitem [ref=e237]:
                - paragraph [ref=e238]: Weekly planning view (Wednesday → Tuesday) to see all raids in a week.
              - listitem [ref=e239]:
                - paragraph [ref=e240]: View who signed up for which raid and with which role/spec.
              - listitem [ref=e241]:
                - paragraph [ref=e242]: Plan assignments cleanly so the confirmed roster stays accurate and synced.
            - heading "Slash Commands" [level=2] [ref=e243]
            - list [ref=e244]:
              - listitem [ref=e245]:
                - paragraph [ref=e246]:
                  - strong [ref=e247]:
                    - code [ref=e248]: /ga
                  - text: — Open/close the Germany’s AllStar main hub window.
            - heading "Who It’s For" [level=2] [ref=e249]
            - list [ref=e250]:
              - listitem [ref=e251]:
                - paragraph [ref=e252]: Guild leadership that wants to reduce manual spreadsheets and constant Discord pings.
              - listitem [ref=e253]:
                - paragraph [ref=e254]: Raiders who want simple signups and clear “what to farm next” priorities.
              - listitem [ref=e255]:
                - paragraph [ref=e256]: Crafting-focused guilds that keep consumables stocked and organized.
