              - text: Huge thanks for downloading and using our addons, that's the best reward.
            - paragraph [ref=e362]:
              - text: Good luck, have fun, and may the Earth Mother protect you all.
              - link "WarcraftRatings Website" [ref=e363] [cursor=pointer]:
