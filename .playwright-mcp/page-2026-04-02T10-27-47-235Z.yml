            - paragraph [ref=e354]:
              - strong [ref=e355]: "INSTALLATION:"
              - text: "- Copy the \"Attune\" folder into your Wow Classic \\Interface\\AddOns\\ folder"
              - text: "- Restart World of Warcraft Classic"
              - strong [ref=e356]: "HOW TO ACTIVATE:"
              - text: Just type /attune in chat to display your progress.
              - text: To survey the progress of your guild, click the "survey" button to collect the information.
              - text: You will then receive progress data from any guild member with the addon.
              - text: (For this to work, guildies will need the addon too)
              - strong [ref=e357]: "CONTACT:"
              - text: Join the discord server to have a say in the direction of the addon
              - text: "Submit bugs/suggestions/comments here:"
              - link "https://discord.gg/MpfDeBZ" [ref=e358] [cursor=pointer]:
                - /url: https://discord.gg/MpfDeBZ
            - paragraph [ref=e359]
            - paragraph [ref=e360]:
              - text: Developing our addons and websites takes time and effort, and is a single-person job.
              - text: If you feel like participating in some way, you can donate to the cause :-)
              - link [ref=e361] [cursor=pointer]:
