          - heading "Description" [level=2] [ref=e257]
          - generic [ref=e259]:
            - heading "Supports Vanilla, TBC, WotLK and MoP" [level=1] [ref=e260]
            - paragraph [ref=e261]: Please do not use other Addons with this name, these are outdated and will break the functionality.
            - heading "Feedback" [level=1] [ref=e262]
            - paragraph [ref=e263]:
              - text: Visit the Discord Server to give feedback.
              - link "Discord Server" [ref=e264] [cursor=pointer]:
                - /url: https://discord.gg/YddUBQ6R55
                - img "Discord Server" [ref=e265]
            - heading "Support" [level=1] [ref=e266]
            - paragraph [ref=e267]: To keep this addon alive it would be very helpful to make a small donation. Thank you very much!
            - paragraph [ref=e268]:
              - link "Donate" [ref=e269] [cursor=pointer]:
                - /url: https://www.curseforge.com/linkout?remoteUrl=https://www.paypal.com/cgi-bin/webscr?cmd=_donations&business=dkplootmaster@withoutascratch.net&lc=US&no_note=0&item_name=Thank you for suppporting Profession Master&cn=&curency_code=EUR&bn=PP-DonationsBF:btn_donateCC_LG.gif:NonHosted
                - img "Donate" [ref=e270]
            - heading "Overview" [level=1] [ref=e271]
            - paragraph [ref=e272]: "Profession Master should help you and your guild to know faster which player has which profession and who can craft which item or who has learned which enchantment. To make this work Profession Master builds in the following components of WoW:"
            - heading "Era-Servers" [level=3] [ref=e273]
            - paragraph [ref=e274]: You can link Enchants in the Text Chat with Profession Master what is only available in TBC by default.
            - heading "Profession synchronization" [level=3] [ref=e275]
            - paragraph [ref=e276]: Regularly when logging in or learning new profession skills, the learned professions and skills will be synchronized with the other players of your guild. It is important to send only newly learned skills so that the speed of wow is not affected.
            - heading "Profession overview" [level=3] [ref=e277]
            - paragraph [ref=e278]: Profession Master also offers you the possibility to display and search all known professions and their players in a single overview. Players who are online will be highlighted there as well.
            - paragraph [ref=e279]:
              - img "Profession Overview" [ref=e280]
            - heading "Tooltip extension" [level=3] [ref=e281]
            - paragraph [ref=e282]: The tooltips show you - if known - the players who can craft the item. The same applies to tooltips of professional skills. The tooltips also take into account whether you yourself have learned this skill or which of the known players is currently online.
            - paragraph [ref=e283]:
              - img "Tooltip Extension" [ref=e284]
            - heading "Shopping List" [level=3] [ref=e285]
            - paragraph [ref=e286]: You can put Enchants or Items to the Shopping List to remember what you need. You will also be informed which reagents are missing in your bags.
            - paragraph [ref=e287]:
              - img "Add to Shopping List" [ref=e288]
